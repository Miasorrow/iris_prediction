name: Build, Push to DockerHub and Deploy to Azure Web App

env:
  DOCKERHUB_IMAGE_BACK: ${{ secrets.DOCKER_USERNAME }}/iris_back
  DOCKERHUB_IMAGE_FRONT: ${{ secrets.DOCKER_USERNAME }}/iris_front
  AZURE_WEBAPP_BACK: Irispredictionback2
  AZURE_WEBAPP_FRONT: irisfront2

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push-back:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD}}

      - name: Build and push BACK to Docker Hub
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_BACK }}:${{ github.sha }}
            ${{ env.DOCKERHUB_IMAGE_BACK }}:latest
          file: ./Dockerfile   # 👈 adapter le chemin

  build-and-push-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD}}

      - name: Build and push FRONT to Docker Hub
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_FRONT }}:${{ github.sha }}
            ${{ env.DOCKERHUB_IMAGE_FRONT }}:latest
          context: ./front
          file: ./front/Dockerfile   # 👈 adapter le chemin

  deploy-back:
    runs-on: ubuntu-latest
    needs: build-and-push-back
    environment:
      name: 'Development'
      url: ${{ steps.deploy-back.outputs.webapp-url }}
    steps:
      - name: Deploy BACK to Azure Web App
        id: deploy-back
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_BACK }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACK }}
          images: '${{ env.DOCKERHUB_IMAGE_BACK }}:${{ github.sha }}'

  deploy-front:
    runs-on: ubuntu-latest
    needs: build-and-push-front
    environment:
      name: 'Development'
      url: ${{ steps.deploy-front.outputs.webapp-url }}
    steps:
      - name: Deploy FRONT to Azure Web App
        id: deploy-front
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_FRONT }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONT }}
          images: '${{ env.DOCKERHUB_IMAGE_FRONT }}:${{ github.sha }}'
